name: Sanitized PashamCrafts diagnostics

on:
  push:
    branches: [main]
    paths:
      - "ci/diagnostic-request.json"
      - ".github/workflows/sanitized-diagnostic.yml"

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    outputs:
      request_id: ${{ steps.request.outputs.request_id }}
      target_sha: ${{ steps.request.outputs.target_sha }}
      schema_result: ${{ steps.schema.outputs.result }}
      schema_detail: ${{ steps.schema.outputs.detail }}
      tests_result: ${{ steps.tests.outputs.result }}
      tests_detail: ${{ steps.tests.outputs.detail }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:password@localhost/pashamcrafts_test
    steps:
      - name: Checkout diagnostic request
        uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Validate request
        id: request
        shell: bash
        run: |
          set -euo pipefail
          request_id="$(jq -er '.request_id' ci/diagnostic-request.json)"
          target_sha="$(jq -er '.target_sha' ci/diagnostic-request.json)"
          [[ "${request_id}" =~ ^[a-z0-9][a-z0-9._-]{0,79}$ ]]
          [[ "${target_sha}" =~ ^[0-9a-f]{40}$ ]]
          echo "request_id=${request_id}" >> "${GITHUB_OUTPUT}"
          echo "target_sha=${target_sha}" >> "${GITHUB_OUTPUT}"

      - name: Checkout exact PashamCrafts commit
        uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          repository: faheemKamboh/pashamcrafts
          ref: ${{ steps.request.outputs.target_sha }}
          token: ${{ secrets.PASHAMCRAFTS_READ_TOKEN }}
          persist-credentials: false
          fetch-depth: 1
          path: app

      - name: Confirm exact checkout
        run: test "$(git -C app rev-parse HEAD)" = "${{ steps.request.outputs.target_sha }}"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libvips postgresql-client

      - name: Set up Ruby and gems
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9
        with:
          bundler-cache: true
          working-directory: app

      - name: Prepare database
        working-directory: app
        run: bundle exec rails db:create db:migrate

      - name: Summarize schema consistency
        id: schema
        working-directory: app
        shell: bash
        run: |
          set -euo pipefail
          committed_hash="$(git show HEAD:db/schema.rb | git hash-object --stdin)"
          generated_hash="$(git hash-object db/schema.rb)"
          numstat="$(git diff --numstat -- db/schema.rb | awk '{print $1 "+/" $2 "-"}' | head -n 1)"
          if git diff --quiet -- db/schema.rb; then
            result=success
            detail="schema clean; hash=${committed_hash:0:12}"
          else
            result=failure
            detail="schema differs ${numstat:-unknown}; committed=${committed_hash:0:12}; generated=${generated_hash:0:12}"
          fi
          echo "result=${result}" >> "${GITHUB_OUTPUT}"
          echo "detail=${detail}" >> "${GITHUB_OUTPUT}"
          echo "${detail}"

      - name: Summarize RSpec and coverage
        id: tests
        working-directory: app
        shell: bash
        run: |
          set +e
          bundle exec rspec --format progress > "${RUNNER_TEMP}/rspec.log" 2>&1
          command_status=$?
          summary="$(grep -E '^[0-9]+ examples?, [0-9]+ failures?' "${RUNNER_TEMP}/rspec.log" | tail -n 1 || true)"
          coverage="$(grep -oE 'Line Coverage: [0-9.]+' "${RUNNER_TEMP}/rspec.log" | tail -n 1 | awk '{print $3}' || true)"
          failed="$(grep -E '^rspec \./spec/' "${RUNNER_TEMP}/rspec.log" | head -n 1 || true)"
          coverage_status=1
          if [ -n "${coverage}" ]; then
            awk -v coverage="${coverage}" 'BEGIN { exit !(coverage >= 98) }'
            coverage_status=$?
          fi
          if [ "${command_status}" -eq 0 ] && [ "${coverage_status}" -eq 0 ]; then result=success; else result=failure; fi
          detail="${summary:-summary unavailable}; coverage=${coverage:-unavailable}; command=${command_status}"
          [ -z "${failed}" ] || detail="${detail}; ${failed}"
          detail="$(printf '%s' "${detail}" | tr '\n\r' '  ' | cut -c1-400)"
          echo "result=${result}" >> "${GITHUB_OUTPUT}"
          echo "detail=${detail}" >> "${GITHUB_OUTPUT}"
          echo "${detail}"
          exit 0

  publish:
    if: always()
    needs: diagnose
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish sanitized diagnostic statuses
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ needs.diagnose.outputs.target_sha }}
          SCHEMA_RESULT: ${{ needs.diagnose.outputs.schema_result }}
          SCHEMA_DETAIL: ${{ needs.diagnose.outputs.schema_detail }}
          TESTS_RESULT: ${{ needs.diagnose.outputs.tests_result }}
          TESTS_DETAIL: ${{ needs.diagnose.outputs.tests_detail }}
        run: |
          set -euo pipefail
          publish() {
            local context="$1" result="$2" detail="$3" state payload
            case "${result}" in success) state=success ;; failure) state=failure ;; *) state=error ;; esac
            detail="$(printf '%s' "${detail:-diagnostic unavailable}" | cut -c1-130)"
            payload="$(jq -n --arg state "${state}" --arg context "${context}" --arg description "${detail}" --arg target_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{state: $state, context: $context, description: $description, target_url: $target_url}')"
            curl --fail-with-body --silent --show-error --request POST \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
              --data "${payload}" > /dev/null
          }
          echo "SCHEMA_DETAIL=${SCHEMA_DETAIL:-unavailable}"
          echo "TESTS_DETAIL=${TESTS_DETAIL:-unavailable}"
          publish "pashamcrafts/schema-detail" "${SCHEMA_RESULT:-error}" "${SCHEMA_DETAIL:-unavailable}"
          publish "pashamcrafts/tests-detail" "${TESTS_RESULT:-error}" "${TESTS_DETAIL:-unavailable}"
