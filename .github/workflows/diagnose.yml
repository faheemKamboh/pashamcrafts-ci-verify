name: Diagnose approved commit

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/diagnose.yml"
      - "ci/target.sha"

permissions:
  contents: read

jobs:
  diagnose:
    name: Collect sanitized diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      tests_result: ${{ steps.tests.outputs.result }}
      tests_detail: ${{ steps.tests.outputs.detail }}
      security_result: ${{ steps.security.outputs.result }}
      security_detail: ${{ steps.security.outputs.detail }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:password@localhost/pashamcrafts_test
    steps:
      - uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          persist-credentials: false
          fetch-depth: 1
      - id: target
        shell: bash
        run: |
          set -euo pipefail
          target_sha="$(tr -d '[:space:]' < ci/target.sha)"
          [[ "${target_sha}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          echo "sha=${target_sha}" >> "${GITHUB_OUTPUT}"
      - uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          repository: faheemKamboh/pashamcrafts
          ref: ${{ steps.target.outputs.sha }}
          token: ${{ secrets.PASHAMCRAFTS_READ_TOKEN }}
          persist-credentials: false
          fetch-depth: 1
          path: app
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libvips postgresql-client
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9
        with:
          bundler-cache: true
          working-directory: app
      - working-directory: app
        run: bundle exec rails db:create db:migrate
      - name: Diagnose RSpec and coverage
        id: tests
        working-directory: app
        shell: bash
        run: |
          set +e
          bundle exec rspec --format progress > "${RUNNER_TEMP}/rspec.log" 2>&1
          status=$?
          summary="$(grep -E '^[0-9]+ examples?, [0-9]+ failures?' "${RUNNER_TEMP}/rspec.log" | tail -n 1 || true)"
          coverage="$(grep -oE 'Line Coverage: [0-9.]+' "${RUNNER_TEMP}/rspec.log" | tail -n 1 | awk '{print $3}' || true)"
          failed="$(grep -E '^rspec \./spec/' "${RUNNER_TEMP}/rspec.log" | head -n 1 || true)"
          coverage_ok=1
          if [ -n "${coverage}" ]; then
            awk -v coverage="${coverage}" 'BEGIN { exit !(coverage >= 98) }'
            coverage_ok=$?
          fi
          if [ "${status}" -eq 0 ] && [ "${coverage_ok}" -eq 0 ]; then result=success; else result=failure; fi
          detail="${summary:-summary unavailable}; coverage=${coverage:-unavailable}"
          [ -n "${failed}" ] && detail="${detail}; ${failed}"
          detail="$(printf '%s' "${detail}" | tr '\n\r' '  ' | cut -c1-220)"
          echo "result=${result}" >> "${GITHUB_OUTPUT}"
          echo "detail=${detail}" >> "${GITHUB_OUTPUT}"
          echo "${detail}"
      - name: Diagnose Brakeman
        id: security
        working-directory: app
        shell: bash
        run: |
          set +e
          bin/brakeman --no-pager -q > "${RUNNER_TEMP}/brakeman.log" 2>&1
          status=$?
          result=$([ "${status}" -eq 0 ] && echo success || echo failure)
          detail="$(grep -Ei 'latest|upgrade|version|security warnings|warnings found|error' "${RUNNER_TEMP}/brakeman.log" | tail -n 4 | tr '\n\r' '  ' | cut -c1-220)"
          [ -n "${detail}" ] || detail="Brakeman exited with status ${status}"
          echo "result=${result}" >> "${GITHUB_OUTPUT}"
          echo "detail=${detail}" >> "${GITHUB_OUTPUT}"
          echo "${detail}"

  report:
    if: always()
    needs: diagnose
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Publish sanitized diagnostic statuses
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TEST_RESULT: ${{ needs.diagnose.outputs.tests_result }}
          TEST_DETAIL: ${{ needs.diagnose.outputs.tests_detail }}
          SECURITY_RESULT: ${{ needs.diagnose.outputs.security_result }}
          SECURITY_DETAIL: ${{ needs.diagnose.outputs.security_detail }}
        run: |
          set -euo pipefail
          publish() {
            local context="$1" result="$2" detail="$3" state
            case "${result}" in success) state=success;; failure) state=failure;; *) state=error;; esac
            detail="$(printf '%s' "${detail:-diagnostic unavailable}" | cut -c1-130)"
            payload="$(jq -n --arg state "${state}" --arg context "${context}" --arg description "${detail}" --arg target_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{state: $state, context: $context, description: $description, target_url: $target_url}')"
            curl --fail-with-body --silent --show-error --request POST \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
              --data "${payload}" > /dev/null
          }
          publish "pashamcrafts/tests-detail" "${TEST_RESULT}" "${TEST_DETAIL}"
          publish "pashamcrafts/security-detail" "${SECURITY_RESULT}" "${SECURITY_DETAIL}"
