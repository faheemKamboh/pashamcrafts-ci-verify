name: Export generated verification files

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/export-generated.yml"
      - "ci/target.sha"

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          persist-credentials: false
          fetch-depth: 1
      - id: target
        shell: bash
        run: |
          set -euo pipefail
          target_sha="$(tr -d '[:space:]' < ci/target.sha)"
          [[ "${target_sha}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          echo "sha=${target_sha}" >> "${GITHUB_OUTPUT}"
      - uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          repository: faheemKamboh/pashamcrafts
          ref: ${{ steps.target.outputs.sha }}
          token: ${{ secrets.PASHAMCRAFTS_READ_TOKEN }}
          persist-credentials: false
          fetch-depth: 1
          path: app
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9
        with:
          bundler-cache: true
          working-directory: app
      - name: Generate current Brakeman lockfile
        working-directory: app
        run: |
          bundle update brakeman --conservative
          grep -F "brakeman (8.0.5)" Gemfile.lock
      - name: Encrypt generated file
        working-directory: app
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/encrypted-export"
          tar -czf "${RUNNER_TEMP}/generated-files.tar.gz" Gemfile.lock
          cat > "${RUNNER_TEMP}/export-public.pem" <<'PUBLIC_KEY'
          -----BEGIN PUBLIC KEY-----
          MIIBojANBgkqhkiG9w0BAQEFAAOCAY8AMIIBigKCAYEAvPwNhfUz9h2CQCGNF5t9
          HzaXl7I1v+nTMKyNBiz8/xNhKM4mCLNhGMIvZlotgaSG+kCNqJBZ2bLBFm2Cabz2
          Ds2u0UVdaSyAS2NWNg2HVFwb7Ls6x6fa/WATuRefMfb7Is27SSFibIldgV9uMadt
          C5cFPup74cJP+rZpbwkESaWXs8gt1SNekiRvYkt9oXHqh6C5KlXhV6nXmcn0x8El
          WqjypO4hEWSynjvV5Zdwihs3zwqomqvGSVWRgE9W6bUxbc51jtWEOstnxQfva8Kz
          mPjHksG8TgPqASdGS6vzoqCvhz+GWWNhrtU2QCWaudYj4T14X954OQ/YOjBLVqdH
          +wtirlpMGsN1kYosycgRMxygoljN9JvV9i2WE3WDxpS3sEHAVXLpNfxGiXMUkx52
          NDND4QAqgNJBxIkgtx7iymLqppWTYjm3LwgM6fcfa5DsbSa2ljUsDRValau1ql3v
          a5VMIBMBsmY9gqNN3F9waaB2hUlT5wsgQx/BZNq7BzhnAgMBAAE=
          -----END PUBLIC KEY-----
          PUBLIC_KEY
          openssl rand -hex 32 > "${RUNNER_TEMP}/export-passphrase"
          openssl enc -aes-256-cbc -salt -pbkdf2 \
            -in "${RUNNER_TEMP}/generated-files.tar.gz" \
            -out "${RUNNER_TEMP}/encrypted-export/payload.enc" \
            -pass file:"${RUNNER_TEMP}/export-passphrase"
          openssl pkeyutl -encrypt -pubin \
            -inkey "${RUNNER_TEMP}/export-public.pem" \
            -in "${RUNNER_TEMP}/export-passphrase" \
            -out "${RUNNER_TEMP}/encrypted-export/passphrase.enc" \
            -pkeyopt rsa_padding_mode:oaep \
            -pkeyopt rsa_oaep_md:sha256
          rm -f "${RUNNER_TEMP}/generated-files.tar.gz" "${RUNNER_TEMP}/export-passphrase" "${RUNNER_TEMP}/export-public.pem"
      - name: Upload encrypted export
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: encrypted-generated-files
          path: ${{ runner.temp }}/encrypted-export
          retention-days: 1
          if-no-files-found: error

  report:
    if: always()
    needs: export
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Publish export status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ needs.export.result }}
        run: |
          set -euo pipefail
          case "${RESULT}" in success) state=success;; failure) state=failure;; *) state=error;; esac
          payload="$(jq -n --arg state "${state}" --arg context "pashamcrafts/encrypted-export" --arg description "Encrypted generated-file export ${RESULT}" --arg target_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{state: $state, context: $context, description: $description, target_url: $target_url}')"
          curl --fail-with-body --silent --show-error --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            --data "${payload}" > /dev/null
