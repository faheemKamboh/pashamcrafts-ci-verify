name: Export encrypted Brakeman diagnostics

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/encrypted-brakeman-diagnostic.yml"
      - "ci/target.sha"

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          persist-credentials: false
          fetch-depth: 1
      - id: target
        shell: bash
        run: |
          set -euo pipefail
          target_sha="$(tr -d '[:space:]' < ci/target.sha)"
          [[ "${target_sha}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          echo "sha=${target_sha}" >> "${GITHUB_OUTPUT}"
      - uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          repository: faheemKamboh/pashamcrafts
          ref: ${{ steps.target.outputs.sha }}
          token: ${{ secrets.PASHAMCRAFTS_READ_TOKEN }}
          persist-credentials: false
          fetch-depth: 1
          path: app
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9
        with:
          bundler-cache: true
          working-directory: app
      - name: Run Brakeman privately
        working-directory: app
        shell: bash
        run: |
          set +e
          bundle exec brakeman --quiet --no-pager --exit-on-warn --exit-on-error -f json -o "${RUNNER_TEMP}/brakeman.json"
          echo "$?" > "${RUNNER_TEMP}/brakeman.exit"
          exit 0
      - name: Encrypt report
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/encrypted-brakeman"
          tar -czf "${RUNNER_TEMP}/brakeman-report.tar.gz" -C "${RUNNER_TEMP}" brakeman.json brakeman.exit
          cat > "${RUNNER_TEMP}/diagnostic-public.pem" <<'PUBLIC_KEY'
          -----BEGIN PUBLIC KEY-----
          MIIBojANBgkqhkiG9w0BAQEFAAOCAY8AMIIBigKCAYEAq0+e4QuKjIqicH4FOmbg
          5eLb+RBRGjLsf1hVj3DA2QscIiL3/35H07ZFeXXZ2akEfLYtX/lnLiIHihMxW/8B
          xgMgXHETYzcGZ3JaRLLL8prAi1nPaYiajxFkiE2UevDKzE+5pmJ5CpIt+tB5L6Kq
          3xay91hYitCdc7OLFQMt1yIzZZnbOAL4Sa3Zo1lVg8DMeQmyjwuN7AZSVkQOvbLa
          QysHW4+IBP8E9N4B+3yspqbmh8bYum26wfTaD35LBQSUasmpQ7RMIu6bBeUmk898
          2wNCOe0PTK3OyW9T9kGkzkYrE0PNW5rOx2U3IjgMud0g1+I6HxNA8llOn1xI0m6t
          oZZOh7PsN1Gq/bfsdF91gZNfrlsglSqbfx8RJJWn8bcqF7jcxnos+h8nuQMrjIa0
          WX7ogy9unowrcXS3ILle5bRQssggzsIZLOdnUV7QFMi43cr+ZFg1wo5rQP9vR7zg
          tV+Gz9SXCRLZOevXhH4E8jqgTKg9RL1WcA+WG9ckmYU7AgMBAAE=
          -----END PUBLIC KEY-----
          PUBLIC_KEY
          openssl rand -hex 32 > "${RUNNER_TEMP}/diagnostic-passphrase"
          openssl enc -aes-256-cbc -salt -pbkdf2 -in "${RUNNER_TEMP}/brakeman-report.tar.gz" -out "${RUNNER_TEMP}/encrypted-brakeman/payload.enc" -pass file:"${RUNNER_TEMP}/diagnostic-passphrase"
          openssl pkeyutl -encrypt -pubin -inkey "${RUNNER_TEMP}/diagnostic-public.pem" -in "${RUNNER_TEMP}/diagnostic-passphrase" -out "${RUNNER_TEMP}/encrypted-brakeman/passphrase.enc" -pkeyopt rsa_padding_mode:oaep -pkeyopt rsa_oaep_md:sha256
          rm -f "${RUNNER_TEMP}/brakeman-report.tar.gz" "${RUNNER_TEMP}/brakeman.json" "${RUNNER_TEMP}/brakeman.exit" "${RUNNER_TEMP}/diagnostic-passphrase" "${RUNNER_TEMP}/diagnostic-public.pem"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: encrypted-brakeman-report
          path: ${{ runner.temp }}/encrypted-brakeman
          retention-days: 1
          if-no-files-found: error

  report:
    if: always()
    needs: diagnose
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ needs.diagnose.result }}
        run: |
          set -euo pipefail
          case "${RESULT}" in success) state=success;; failure) state=failure;; *) state=error;; esac
          payload="$(jq -n --arg state "${state}" --arg context "pashamcrafts/encrypted-brakeman" --arg description "Encrypted Brakeman report ${RESULT}" --arg target_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{state: $state, context: $context, description: $description, target_url: $target_url}')"
          curl --fail-with-body --silent --show-error --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            --data "${payload}" > /dev/null
