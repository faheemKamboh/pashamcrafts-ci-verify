name: Shared static PashamCrafts checks

on:
  workflow_call:
    inputs:
      request_id:
        required: true
        type: string
      target_sha:
        required: true
        type: string
      run_lint:
        required: false
        default: false
        type: boolean
      run_security:
        required: false
        default: false
        type: boolean
    secrets:
      PASHAMCRAFTS_READ_TOKEN:
        required: true
    outputs:
      result:
        value: ${{ jobs.checks.outputs.result }}
      lint_result:
        value: ${{ jobs.checks.outputs.lint_result }}
      security_result:
        value: ${{ jobs.checks.outputs.security_result }}

permissions:
  contents: read

jobs:
  checks:
    name: Rails static checks
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      result: ${{ steps.collect.outputs.result }}
      lint_result: ${{ steps.collect.outputs.lint_result }}
      security_result: ${{ steps.collect.outputs.security_result }}

    steps:
      - name: Checkout verification configuration
        uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Checkout exact PashamCrafts commit
        uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          repository: faheemKamboh/pashamcrafts
          ref: ${{ inputs.target_sha }}
          token: ${{ secrets.PASHAMCRAFTS_READ_TOKEN }}
          persist-credentials: false
          fetch-depth: 1
          path: app

      - name: Confirm exact checkout
        run: test "$(git -C app rev-parse HEAD)" = "${{ inputs.target_sha }}"

      - name: Set up Ruby and gems
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9
        with:
          bundler-cache: true
          working-directory: app

      - name: Run RuboCop
        id: lint
        if: inputs.run_lint
        continue-on-error: true
        working-directory: app
        shell: bash
        run: |
          set +e
          bin/rubocop --format progress > "${RUNNER_TEMP}/rubocop.log" 2>&1
          status=$?
          result=$([ "${status}" -eq 0 ] && echo success || echo failure)
          echo "result=${result}" >> "${GITHUB_OUTPUT}"
          grep -E '[0-9]+ files? inspected' "${RUNNER_TEMP}/rubocop.log" | tail -n 1 || true
          exit "${status}"

      - name: Run Brakeman
        id: security
        if: inputs.run_security
        continue-on-error: true
        working-directory: app
        shell: bash
        run: |
          set +e
          bundle exec brakeman --quiet --no-pager --exit-on-warn --exit-on-error \
            -f json -o "${RUNNER_TEMP}/brakeman.json" \
            > "${RUNNER_TEMP}/brakeman.log" 2>&1
          status=$?
          result=$([ "${status}" -eq 0 ] && echo success || echo failure)
          echo "result=${result}" >> "${GITHUB_OUTPUT}"
          echo "Brakeman: ${result^^}"
          exit "${status}"

      - name: Collect static results
        id: collect
        if: always()
        shell: bash
        env:
          LINT_RESULT: ${{ steps.lint.outputs.result }}
          SECURITY_RESULT: ${{ steps.security.outputs.result }}
        run: |
          set -euo pipefail
          lint="${LINT_RESULT:-skipped}"
          security="${SECURITY_RESULT:-skipped}"
          result=success

          [ "${{ inputs.run_lint }}" = false ] || [ "${lint}" = success ] || result=failure
          [ "${{ inputs.run_security }}" = false ] || [ "${security}" = success ] || result=failure

          {
            echo "result=${result}"
            echo "lint_result=${lint}"
            echo "security_result=${security}"
          } >> "${GITHUB_OUTPUT}"

      - name: Encrypt static diagnostics
        if: always() && steps.collect.outputs.result != 'success'
        shell: bash
        run: |
          bash ci/encrypt-diagnostics.sh \
            "${RUNNER_TEMP}/encrypted-static-diagnostics" \
            "${RUNNER_TEMP}/rubocop.log" \
            "${RUNNER_TEMP}/brakeman.log" \
            "${RUNNER_TEMP}/brakeman.json"

      - name: Upload encrypted static diagnostics
        if: always() && steps.collect.outputs.result != 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: encrypted-static-${{ inputs.request_id }}
          path: ${{ runner.temp }}/encrypted-static-diagnostics
          retention-days: 1
          if-no-files-found: error
