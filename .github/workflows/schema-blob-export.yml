name: Export generated PashamCrafts schema blob

on:
  push:
    branches: [main]
    paths:
      - "ci/schema-blob-request.sha"
      - ".github/workflows/schema-blob-export.yml"

permissions:
  contents: read
  statuses: write

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:password@localhost/pashamcrafts_test
    steps:
      - name: Checkout export configuration
        uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Validate target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          target_sha="$(tr -d '[:space:]' < ci/schema-blob-request.sha)"
          [[ "${target_sha}" =~ ^[0-9a-f]{40}$ ]]
          echo "target_sha=${target_sha}" >> "${GITHUB_OUTPUT}"

      - name: Checkout exact PashamCrafts commit
        uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          repository: faheemKamboh/pashamcrafts
          ref: ${{ steps.target.outputs.target_sha }}
          token: ${{ secrets.PASHAMCRAFTS_READ_TOKEN }}
          persist-credentials: false
          fetch-depth: 1
          path: app

      - name: Set up Ruby and gems
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9
        with:
          bundler-cache: true
          working-directory: app

      - name: Generate exact schema
        working-directory: app
        run: bundle exec rails db:create db:migrate

      - name: Create dangling schema blob in PashamCrafts
        id: blob
        shell: bash
        env:
          PRIVATE_TOKEN: ${{ secrets.PASHAMCRAFTS_READ_TOKEN }}
        run: |
          set -euo pipefail
          encoded="$(base64 -w0 app/db/schema.rb)"
          response="$(jq -n --arg content "${encoded}" '{content: $content, encoding: "base64"}' | curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${PRIVATE_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/faheemKamboh/pashamcrafts/git/blobs" \
            --data-binary @-)"
          blob_sha="$(jq -er '.sha' <<< "${response}")"
          echo "blob_sha=${blob_sha}" >> "${GITHUB_OUTPUT}"
          echo "Generated schema blob: ${blob_sha}"

      - name: Publish result
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          BLOB_SHA: ${{ steps.blob.outputs.blob_sha }}
          RESULT: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${RESULT}" = success ]; then
            state=success
            description="Schema blob ${BLOB_SHA}"
          else
            state=failure
            description="Schema blob export blocked by token permissions"
          fi
          payload="$(jq -n --arg state "${state}" --arg context "pashamcrafts/schema-blob-export" --arg description "${description}" --arg target_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{state: $state, context: $context, description: $description, target_url: $target_url}')"
          curl --fail-with-body --silent --show-error --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            --data "${payload}" > /dev/null
