name: Commit generated PashamCrafts schema

on:
  push:
    branches: [main]
    paths:
      - "ci/schema-commit-request.json"
      - ".github/workflows/schema-blob-export.yml"

permissions:
  contents: read
  statuses: write

jobs:
  verify-request:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      request_id: ${{ steps.request.outputs.request_id }}
      target_sha: ${{ steps.request.outputs.target_sha }}
      branch: ${{ steps.request.outputs.branch }}
      diagnostic: ${{ steps.access.outputs.diagnostic }}
    steps:
      - name: Validate request
        id: request
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          response="$(curl --fail-with-body --silent --show-error \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/contents/ci/schema-commit-request.json?ref=${GITHUB_SHA}")"
          request="$(jq -er '.content' <<< "${response}" | tr -d '\n' | base64 --decode)"
          request_id="$(jq -er '.request_id' <<< "${request}")"
          target_sha="$(jq -er '.target_sha' <<< "${request}")"
          branch="$(jq -er '.branch' <<< "${request}")"
          [[ "${request_id}" =~ ^[a-z0-9][a-z0-9._-]{0,79}$ ]]
          [[ "${target_sha}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${branch}" =~ ^feature/issue-[0-9]+-[a-z0-9-]+$ ]]
          echo "request_id=${request_id}" >> "${GITHUB_OUTPUT}"
          echo "target_sha=${target_sha}" >> "${GITHUB_OUTPUT}"
          echo "branch=${branch}" >> "${GITHUB_OUTPUT}"

      - name: Check scoped schema token access
        id: access
        shell: bash
        env:
          PRIVATE_TOKEN: ${{ secrets.PASHAMCRAFTS_SCHEMA_WRITE_TOKEN }}
          TARGET_SHA: ${{ steps.request.outputs.target_sha }}
          TARGET_BRANCH: ${{ steps.request.outputs.branch }}
        run: |
          set -euo pipefail
          ok=false
          diagnostic=unknown
          api="https://api.github.com/repos/faheemKamboh/pashamcrafts"
          auth=(--header "Authorization: Bearer ${PRIVATE_TOKEN}" --header "Accept: application/vnd.github+json" --header "X-GitHub-Api-Version: 2022-11-28")

          if [ -z "${PRIVATE_TOKEN}" ]; then
            diagnostic=secret-empty
          else
            repo_response="$(mktemp)"
            repo_status="$(curl --silent --show-error --output "${repo_response}" --write-out '%{http_code}' "${auth[@]}" "${api}")"
            if [ "${repo_status}" != "200" ]; then
              diagnostic="repo-http-${repo_status}"
              message="$(jq -r '.message // "Unknown GitHub API error"' "${repo_response}" 2>/dev/null || printf 'Unreadable GitHub API response')"
              echo "::error::Schema token repository lookup failed (${repo_status}): ${message}"
            elif [ "$(jq -r '.permissions.push // false' "${repo_response}")" != "true" ]; then
              diagnostic=contents-write-denied
              echo "::error::Schema token can read pashamcrafts but does not have Contents read/write permission"
            else
              encoded_branch="$(jq -rn --arg value "${TARGET_BRANCH}" '$value | @uri')"
              branch_response="$(mktemp)"
              branch_status="$(curl --silent --show-error --output "${branch_response}" --write-out '%{http_code}' "${auth[@]}" "${api}/branches/${encoded_branch}")"

              if [ "${branch_status}" != "200" ]; then
                diagnostic="branch-http-${branch_status}"
                message="$(jq -r '.message // "Unknown GitHub API error"' "${branch_response}" 2>/dev/null || printf 'Unreadable GitHub API response')"
                echo "::error::Schema token branch lookup failed (${branch_status}): ${message}"
              else
                current_sha="$(jq -er '.commit.sha' "${branch_response}")"
                if [ "${current_sha}" != "${TARGET_SHA}" ]; then
                  diagnostic=branch-head-mismatch
                  echo "::error::Requested branch head changed: expected ${TARGET_SHA:0:12}, found ${current_sha:0:12}"
                else
                  ok=true
                  diagnostic=ok
                fi
              fi
            fi
          fi

          if [ "${diagnostic}" = secret-empty ]; then
            echo "::error::PASHAMCRAFTS_SCHEMA_WRITE_TOKEN is empty in this repository workflow"
          fi
          echo "ok=${ok}" >> "${GITHUB_OUTPUT}"
          echo "diagnostic=${diagnostic}" >> "${GITHUB_OUTPUT}"

      - name: Enforce verified request
        if: steps.access.outputs.ok != 'true'
        run: exit 1

  commit-schema:
    needs: verify-request
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      commit_sha: ${{ steps.commit.outputs.commit_sha }}
      changed: ${{ steps.commit.outputs.changed }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:password@localhost/pashamcrafts_test
    steps:
      - name: Checkout exact PashamCrafts commit
        uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          repository: faheemKamboh/pashamcrafts
          ref: ${{ needs.verify-request.outputs.target_sha }}
          token: ${{ secrets.PASHAMCRAFTS_READ_TOKEN }}
          persist-credentials: false
          fetch-depth: 1

      - name: Set up Ruby and gems
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9
        with:
          bundler-cache: true

      - name: Generate exact schema
        run: bundle exec rails db:create db:migrate

      - name: Create race-safe schema commit
        id: commit
        shell: bash
        env:
          PRIVATE_TOKEN: ${{ secrets.PASHAMCRAFTS_SCHEMA_WRITE_TOKEN }}
          TARGET_SHA: ${{ needs.verify-request.outputs.target_sha }}
          TARGET_BRANCH: ${{ needs.verify-request.outputs.branch }}
          REQUEST_ID: ${{ needs.verify-request.outputs.request_id }}
        run: |
          set -euo pipefail
          api="https://api.github.com/repos/faheemKamboh/pashamcrafts"
          auth=(--header "Authorization: Bearer ${PRIVATE_TOKEN}" --header "Accept: application/vnd.github+json" --header "X-GitHub-Api-Version: 2022-11-28")
          encoded_branch="$(jq -rn --arg value "${TARGET_BRANCH}" '$value | @uri')"
          current_sha="$(curl --fail-with-body --silent --show-error "${auth[@]}" "${api}/branches/${encoded_branch}" | jq -er '.commit.sha')"
          test "${current_sha}" = "${TARGET_SHA}"

          encoded="$(base64 -w0 db/schema.rb)"
          schema_blob="$(jq -n --arg content "${encoded}" '{content: $content, encoding: "base64"}' | curl --fail-with-body --silent --show-error "${auth[@]}" --request POST "${api}/git/blobs" --data-binary @- | jq -er '.sha')"
          existing_blob="$(curl --fail-with-body --silent --show-error "${auth[@]}" "${api}/contents/db/schema.rb?ref=${TARGET_SHA}" | jq -er '.sha')"

          if [ "${schema_blob}" = "${existing_blob}" ]; then
            echo "commit_sha=${TARGET_SHA}" >> "${GITHUB_OUTPUT}"
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          base_tree="$(curl --fail-with-body --silent --show-error "${auth[@]}" "${api}/git/commits/${TARGET_SHA}" | jq -er '.tree.sha')"
          tree_payload="$(jq -n --arg base_tree "${base_tree}" --arg blob "${schema_blob}" '{base_tree: $base_tree, tree: [{path: "db/schema.rb", mode: "100644", type: "blob", sha: $blob}]}')"
          new_tree="$(curl --fail-with-body --silent --show-error "${auth[@]}" --request POST "${api}/git/trees" --data "${tree_payload}" | jq -er '.sha')"
          commit_payload="$(jq -n --arg message "Commit generated schema (${REQUEST_ID})" --arg tree "${new_tree}" --arg parent "${TARGET_SHA}" '{message: $message, tree: $tree, parents: [$parent]}')"
          new_commit="$(curl --fail-with-body --silent --show-error "${auth[@]}" --request POST "${api}/git/commits" --data "${commit_payload}" | jq -er '.sha')"
          ref_payload="$(jq -n --arg sha "${new_commit}" '{sha: $sha, force: false}')"
          curl --fail-with-body --silent --show-error "${auth[@]}" --request PATCH "${api}/git/refs/heads/${TARGET_BRANCH}" --data "${ref_payload}" > /dev/null
          echo "commit_sha=${new_commit}" >> "${GITHUB_OUTPUT}"
          echo "changed=true" >> "${GITHUB_OUTPUT}"

  publish-result:
    if: always()
    needs: [verify-request, commit-schema]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Publish result
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERIFY_RESULT: ${{ needs.verify-request.result }}
          VERIFY_DIAGNOSTIC: ${{ needs.verify-request.outputs.diagnostic }}
          COMMIT_RESULT: ${{ needs.commit-schema.result }}
          COMMIT_SHA: ${{ needs.commit-schema.outputs.commit_sha }}
          CHANGED: ${{ needs.commit-schema.outputs.changed }}
        run: |
          set -euo pipefail
          if [ "${VERIFY_RESULT}" != success ]; then
            state=failure
            description="Schema token verification failed (${VERIFY_DIAGNOSTIC:-unknown})"
          elif [ "${COMMIT_RESULT}" = success ]; then
            state=success
            description="Schema committed at ${COMMIT_SHA:0:12}; changed=${CHANGED}"
          else
            state=failure
            description="Schema generation or branch update failed"
          fi
          payload="$(jq -n --arg state "${state}" --arg context "pashamcrafts/schema-commit" --arg description "${description}" --arg target_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{state: $state, context: $context, description: $description, target_url: $target_url}')"
          curl --fail-with-body --silent --show-error --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            --data "${payload}" > /dev/null
