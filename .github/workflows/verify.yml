name: Verify approved commit

on:
  push:
    branches: [main]
    paths:
      - "ci/target.sha"
      - ".github/workflows/verify.yml"

permissions:
  contents: read

concurrency:
  group: pashamcrafts-ci-verify
  cancel-in-progress: true

jobs:
  verify:
    name: PashamCrafts verification
    runs-on: ubuntu-latest
    timeout-minutes: 35
    outputs:
      database: ${{ steps.database.outputs.result }}
      schema: ${{ steps.schema.outputs.result }}
      tests: ${{ steps.tests.outputs.result }}
      lint: ${{ steps.lint.outputs.result }}
      security: ${{ steps.security.outputs.result }}
      restore: ${{ steps.restore.outputs.result }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:password@localhost/pashamcrafts_test

    steps:
      - name: Checkout verification configuration
        uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Validate approved target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          target_sha="$(tr -d '[:space:]' < ci/target.sha)"
          [[ "${target_sha}" =~ ^[0-9a-f]{40}$ ]] || { echo "Invalid target SHA."; exit 1; }
          echo "target_sha=${target_sha}" >> "${GITHUB_OUTPUT}"
          echo "Approved target: ${target_sha:0:12}"

      - name: Checkout approved PashamCrafts commit
        uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          repository: faheemKamboh/pashamcrafts
          ref: ${{ steps.target.outputs.target_sha }}
          token: ${{ secrets.PASHAMCRAFTS_READ_TOKEN }}
          persist-credentials: false
          fetch-depth: 1
          path: app

      - name: Confirm exact checkout
        shell: bash
        run: |
          set -euo pipefail
          expected="${{ steps.target.outputs.target_sha }}"
          actual="$(git -C app rev-parse HEAD)"
          test "${actual}" = "${expected}"
          echo "Checked out approved commit ${actual:0:12}."

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libvips postgresql-client

      - name: Set up Ruby and gems
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9
        with:
          bundler-cache: true
          working-directory: app

      - name: Prepare test database
        id: database
        continue-on-error: true
        working-directory: app
        shell: bash
        run: |
          set +e
          bundle exec rails db:create db:migrate > "${RUNNER_TEMP}/database.log" 2>&1
          status=$?
          result=$([ "${status}" -eq 0 ] && echo success || echo failure)
          echo "result=${result}" >> "${GITHUB_OUTPUT}"
          echo "Database preparation: ${result^^}"
          exit "${status}"

      - name: Verify committed schema
        id: schema
        if: steps.database.outputs.result == 'success'
        continue-on-error: true
        working-directory: app
        shell: bash
        run: |
          set +e
          git diff --quiet -- db/schema.rb
          status=$?
          result=$([ "${status}" -eq 0 ] && echo success || echo failure)
          echo "result=${result}" >> "${GITHUB_OUTPUT}"
          echo "Committed schema: ${result^^}"
          exit "${status}"

      - name: Run RSpec and enforce coverage
        id: tests
        if: steps.database.outputs.result == 'success'
        continue-on-error: true
        working-directory: app
        shell: bash
        run: |
          set +e
          bundle exec rspec --format progress > "${RUNNER_TEMP}/rspec.log" 2>&1
          test_status=$?
          summary="$(grep -E '^[0-9]+ examples?, [0-9]+ failures?' "${RUNNER_TEMP}/rspec.log" | tail -n 1 || true)"
          coverage="$(grep -oE 'Line Coverage: [0-9.]+' "${RUNNER_TEMP}/rspec.log" | tail -n 1 | awk '{print $3}' || true)"
          coverage_status=1
          if [ -n "${coverage}" ]; then
            awk -v coverage="${coverage}" 'BEGIN { exit !(coverage >= 98) }'
            coverage_status=$?
          fi
          if [ "${test_status}" -eq 0 ] && [ "${coverage_status}" -eq 0 ]; then result=success; else result=failure; fi
          echo "result=${result}" >> "${GITHUB_OUTPUT}"
          [ -n "${summary}" ] && echo "RSpec: ${summary}" || echo "RSpec summary unavailable."
          [ -n "${coverage}" ] && echo "Line coverage: ${coverage}%" || echo "Line coverage unavailable."
          echo "RSpec and coverage: ${result^^}"
          test "${result}" = success

      - name: Run RuboCop
        id: lint
        continue-on-error: true
        working-directory: app
        shell: bash
        run: |
          set +e
          bin/rubocop --format progress > "${RUNNER_TEMP}/rubocop.log" 2>&1
          status=$?
          result=$([ "${status}" -eq 0 ] && echo success || echo failure)
          echo "result=${result}" >> "${GITHUB_OUTPUT}"
          grep -E '[0-9]+ files? inspected' "${RUNNER_TEMP}/rubocop.log" | tail -n 1 || true
          echo "RuboCop: ${result^^}"
          exit "${status}"

      - name: Run Brakeman
        id: security
        continue-on-error: true
        working-directory: app
        shell: bash
        run: |
          set +e
          bundle exec brakeman --quiet --no-pager --exit-on-warn --exit-on-error > "${RUNNER_TEMP}/brakeman.log" 2>&1
          status=$?
          result=$([ "${status}" -eq 0 ] && echo success || echo failure)
          echo "result=${result}" >> "${GITHUB_OUTPUT}"
          echo "Brakeman: ${result^^}"
          exit "${status}"

      - name: Run backup and restore drill
        id: restore
        continue-on-error: true
        working-directory: app
        shell: bash
        env:
          DATABASE_URL: postgres://postgres:password@localhost/pashamcrafts_backup_source
          RESTORE_DATABASE_URL: postgres://postgres:password@localhost/pashamcrafts_restore_test
          BACKUP_DIR: ${{ runner.temp }}/backup-drill
          ALLOW_DESTRUCTIVE_RESTORE: "true"
          PGPASSWORD: password
        run: |
          set +e
          {
            bundle exec rails db:create db:migrate &&
            bundle exec rails runner 'Audit::Recorder.record!(action: "backup.restore_drill")' &&
            bin/backup_database &&
            createdb --host=localhost --username=postgres pashamcrafts_restore_test &&
            export BACKUP_FILE="$(find "${BACKUP_DIR}" -name '*.dump' -type f | head -n 1)" &&
            test -n "${BACKUP_FILE}" &&
            bin/verify_database_restore &&
            test "$(psql "${RESTORE_DATABASE_URL}" -Atqc "SELECT COUNT(*) FROM audit_events WHERE action = 'backup.restore_drill'")" = "1"
          } > "${RUNNER_TEMP}/restore.log" 2>&1
          status=$?
          result=$([ "${status}" -eq 0 ] && echo success || echo failure)
          echo "result=${result}" >> "${GITHUB_OUTPUT}"
          echo "Backup and restore: ${result^^}"
          exit "${status}"

      - name: Publish verification summary
        if: always()
        shell: bash
        env:
          DATABASE_RESULT: ${{ steps.database.outputs.result }}
          SCHEMA_RESULT: ${{ steps.schema.outputs.result }}
          TEST_RESULT: ${{ steps.tests.outputs.result }}
          LINT_RESULT: ${{ steps.lint.outputs.result }}
          SECURITY_RESULT: ${{ steps.security.outputs.result }}
          RESTORE_RESULT: ${{ steps.restore.outputs.result }}
        run: |
          set -euo pipefail
          database="${DATABASE_RESULT:-error}"
          schema="${SCHEMA_RESULT:-error}"
          tests="${TEST_RESULT:-error}"
          lint="${LINT_RESULT:-error}"
          security="${SECURITY_RESULT:-error}"
          restore="${RESTORE_RESULT:-error}"
          {
            echo "## PashamCrafts verification"
            echo
            printf 'Target: `%s`\n' "${{ steps.target.outputs.target_sha }}"
            echo
            echo "| Check | Result |"
            echo "|---|---|"
            echo "| Database | ${database} |"
            echo "| Committed schema | ${schema} |"
            echo "| RSpec and coverage | ${tests} |"
            echo "| RuboCop | ${lint} |"
            echo "| Brakeman | ${security} |"
            echo "| Backup and restore | ${restore} |"
          } >> "${GITHUB_STEP_SUMMARY}"
          printf 'Results: database=%s schema=%s tests=%s lint=%s security=%s restore=%s\n' "${database}" "${schema}" "${tests}" "${lint}" "${security}" "${restore}"
          test "${database}:${schema}:${tests}:${lint}:${security}:${restore}" = "success:success:success:success:success:success"

  report:
    name: Publish gateway status
    if: always()
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Publish sanitized results
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          JOB_RESULT: ${{ needs.verify.result }}
          DATABASE_RESULT: ${{ needs.verify.outputs.database }}
          SCHEMA_RESULT: ${{ needs.verify.outputs.schema }}
          TEST_RESULT: ${{ needs.verify.outputs.tests }}
          LINT_RESULT: ${{ needs.verify.outputs.lint }}
          SECURITY_RESULT: ${{ needs.verify.outputs.security }}
          RESTORE_RESULT: ${{ needs.verify.outputs.restore }}
        run: |
          set -euo pipefail
          publish_status() {
            local context="$1" result="$2" description="$3" state
            case "${result}" in success) state=success;; failure) state=failure;; *) state=error;; esac
            payload="$(jq -n --arg state "${state}" --arg context "${context}" --arg description "${description}" --arg target_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{state: $state, context: $context, description: $description, target_url: $target_url}')"
            curl --fail-with-body --silent --show-error --request POST \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
              --data "${payload}" > /dev/null
          }
          publish_status "pashamcrafts/database" "${DATABASE_RESULT}" "Database migration verification"
          publish_status "pashamcrafts/schema" "${SCHEMA_RESULT}" "Committed schema consistency"
          publish_status "pashamcrafts/tests" "${TEST_RESULT}" "RSpec and coverage verification"
          publish_status "pashamcrafts/lint" "${LINT_RESULT}" "RuboCop verification"
          publish_status "pashamcrafts/security" "${SECURITY_RESULT}" "Brakeman warning/error scan"
          publish_status "pashamcrafts/restore" "${RESTORE_RESULT}" "Backup and restore verification"
          publish_status "pashamcrafts/verification" "${JOB_RESULT}" "Combined approved-commit verification"
