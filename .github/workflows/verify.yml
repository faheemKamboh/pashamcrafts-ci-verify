name: Dispatch approved private-project checks

on:
  workflow_call:
    inputs:
      project:
        description: Approved private project
        required: true
        type: string
      request_id:
        description: Unique request identifier
        required: false
        type: string
      target_sha:
        description: Exact private-project commit SHA
        required: true
        type: string
      checks:
        description: Comma-separated checks, or full
        required: true
        type: string
      specs:
        description: Comma- or newline-separated test paths when targeted is requested
        required: false
        type: string
  workflow_dispatch:
    inputs:
      project:
        description: Approved private project
        required: true
        type: choice
        options:
          - pashamcrafts
          - taleemi_idara
          - greensvilla
      request_id:
        description: Unique request identifier
        required: false
        type: string
      target_sha:
        description: Exact private-project commit SHA
        required: true
        type: string
      checks:
        description: Comma-separated checks, or full
        required: true
        default: full
        type: string
      specs:
        description: Comma- or newline-separated test paths when targeted is requested
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - "ci/request.json"

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve explicit request
    runs-on: ubuntu-latest
    outputs:
      project: ${{ steps.request.outputs.project }}
      status_prefix: ${{ steps.request.outputs.status_prefix }}
      request_id: ${{ steps.request.outputs.request_id }}
      target_sha: ${{ steps.request.outputs.target_sha }}
      checks_json: ${{ steps.request.outputs.checks_json }}
      specs_json: ${{ steps.request.outputs.specs_json }}
      run_db: ${{ steps.request.outputs.run_db }}
      run_schema: ${{ steps.request.outputs.run_schema }}
      run_tests: ${{ steps.request.outputs.run_tests }}
      run_system_tests: ${{ steps.request.outputs.run_system_tests }}
      run_targeted: ${{ steps.request.outputs.run_targeted }}
      run_restore: ${{ steps.request.outputs.run_restore }}
      run_seeds: ${{ steps.request.outputs.run_seeds }}
      run_static: ${{ steps.request.outputs.run_static }}
      run_lint: ${{ steps.request.outputs.run_lint }}
      run_security: ${{ steps.request.outputs.run_security }}
      run_assets: ${{ steps.request.outputs.run_assets }}
      run_docker: ${{ steps.request.outputs.run_docker }}
    steps:
      - name: Checkout verification configuration
        uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Resolve and validate request
        id: request
        shell: bash
        env:
          DISPATCH_PROJECT: ${{ inputs.project }}
          DISPATCH_REQUEST_ID: ${{ inputs.request_id }}
          DISPATCH_TARGET_SHA: ${{ inputs.target_sha }}
          DISPATCH_CHECKS: ${{ inputs.checks }}
          DISPATCH_SPECS: ${{ inputs.specs }}
        run: |
          set -euo pipefail

          checks_file="${RUNNER_TEMP}/checks.txt"
          specs_file="${RUNNER_TEMP}/specs.txt"
          : > "${checks_file}"
          : > "${specs_file}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            project="${DISPATCH_PROJECT}"
            request_id="${DISPATCH_REQUEST_ID:-manual-${GITHUB_RUN_ID}}"
            target_sha="${DISPATCH_TARGET_SHA}"
            printf '%s\n' "${DISPATCH_CHECKS}" | tr ',' '\n' > "${checks_file}"
            printf '%s\n' "${DISPATCH_SPECS}" | tr ',' '\n' > "${specs_file}"
          else
            project="$(jq -er '.project // "pashamcrafts"' ci/request.json)"
            request_id="$(jq -er '.request_id' ci/request.json)"
            target_sha="$(jq -er '.target_sha' ci/request.json)"
            jq -r '.checks[]?' ci/request.json > "${checks_file}"
            jq -r '.specs[]?' ci/request.json > "${specs_file}"
          fi

          case "${project}" in
            pashamcrafts)
              status_prefix="pashamcrafts"
              ;;
            taleemi_idara)
              status_prefix="taleemi-idara"
              ;;
            greensvilla)
              status_prefix="greensvilla"
              ;;
            *)
              echo "Unsupported project."
              exit 1
              ;;
          esac

          [[ "${request_id}" =~ ^[A-Za-z0-9._-]{1,80}$ ]] || {
            echo "Invalid request identifier."
            exit 1
          }
          [[ "${target_sha}" =~ ^[0-9a-f]{40}$ ]] || {
            echo "Invalid target SHA."
            exit 1
          }

          normalized_checks="${RUNNER_TEMP}/normalized-checks.txt"
          : > "${normalized_checks}"
          while IFS= read -r check; do
            check="$(printf '%s' "${check}" | xargs)"
            [ -z "${check}" ] && continue
            case "${check}" in
              full|schema|tests|system-tests|targeted|lint|security|restore|assets|docker|seeds) ;;
              *) echo "Unsupported check: ${check}"; exit 1 ;;
            esac
            printf '%s\n' "${check}" >> "${normalized_checks}"
          done < "${checks_file}"
          sort -u -o "${normalized_checks}" "${normalized_checks}"

          [ -s "${normalized_checks}" ] || {
            echo "At least one check is required."
            exit 1
          }

          if grep -qx full "${normalized_checks}"; then
            [ "$(wc -l < "${normalized_checks}")" -eq 1 ] || {
              echo "The full preset cannot be combined with individual checks."
              exit 1
            }
            case "${project}" in
              pashamcrafts)
                printf '%s\n' schema tests lint security restore > "${normalized_checks}"
                ;;
              taleemi_idara)
                printf '%s\n' schema tests system-tests lint security > "${normalized_checks}"
                ;;
              greensvilla)
                printf '%s\n' tests system-tests lint security assets docker seeds > "${normalized_checks}"
                ;;
            esac
          fi

          case "${project}" in
            pashamcrafts)
              for unsupported in system-tests assets docker seeds; do
                ! grep -qx "${unsupported}" "${normalized_checks}" || {
                  echo "${unsupported} is not configured for PashamCrafts."
                  exit 1
                }
              done
              ;;
            taleemi_idara)
              for unsupported in restore assets docker seeds; do
                ! grep -qx "${unsupported}" "${normalized_checks}" || {
                  echo "${unsupported} is not configured for Taleemi Idara."
                  exit 1
                }
              done
              ;;
            greensvilla)
              ! grep -qx restore "${normalized_checks}" || {
                echo "restore is not configured for GreensVilla."
                exit 1
              }
              ;;
          esac

          if grep -qx tests "${normalized_checks}" && grep -qx targeted "${normalized_checks}"; then
            echo "Complete and targeted tests cannot be requested together."
            exit 1
          fi

          normalized_specs="${RUNNER_TEMP}/normalized-specs.txt"
          : > "${normalized_specs}"
          while IFS= read -r spec; do
            spec="$(printf '%s' "${spec}" | xargs)"
            [ -z "${spec}" ] && continue
            if [ "${project}" = "taleemi_idara" ]; then
              [[ "${spec}" =~ ^test/[A-Za-z0-9_./-]+_test\.rb(:[0-9]+)?$ ]] || {
                echo "Invalid Taleemi Idara targeted test reference."
                exit 1
              }
            else
              [[ "${spec}" =~ ^spec/[A-Za-z0-9_./-]+_spec\.rb(:[0-9]+)?$ ]] || {
                echo "Invalid RSpec targeted test reference."
                exit 1
              }
            fi
            printf '%s\n' "${spec}" >> "${normalized_specs}"
          done < "${specs_file}"
          sort -u -o "${normalized_specs}" "${normalized_specs}"

          spec_count="$(wc -l < "${normalized_specs}")"
          if grep -qx targeted "${normalized_checks}"; then
            [ "${spec_count}" -gt 0 ] || {
              echo "Targeted checks require at least one test path."
              exit 1
            }
            [ "${spec_count}" -le 25 ] || {
              echo "Targeted checks accept at most 25 test paths."
              exit 1
            }
          elif [ "${spec_count}" -gt 0 ]; then
            echo "Test paths are accepted only with the targeted check."
            exit 1
          fi

          checks_json="$(jq -R -s -c 'split("\n") | map(select(length > 0))' "${normalized_checks}")"
          specs_json="$(jq -R -s -c 'split("\n") | map(select(length > 0))' "${normalized_specs}")"

          requested() { grep -qx "$1" "${normalized_checks}"; }
          bool() { if "$@"; then echo true; else echo false; fi; }

          run_schema="$(bool requested schema)"
          run_tests="$(bool requested tests)"
          run_system_tests="$(bool requested system-tests)"
          run_targeted="$(bool requested targeted)"
          run_restore="$(bool requested restore)"
          run_seeds="$(bool requested seeds)"
          run_lint="$(bool requested lint)"
          run_security="$(bool requested security)"
          run_assets="$(bool requested assets)"
          run_docker="$(bool requested docker)"

          if [ "${run_schema}" = true ] ||
             [ "${run_tests}" = true ] ||
             [ "${run_system_tests}" = true ] ||
             [ "${run_targeted}" = true ] ||
             [ "${run_restore}" = true ] ||
             [ "${run_seeds}" = true ]; then
            run_db=true
          else
            run_db=false
          fi

          if [ "${run_lint}" = true ] ||
             [ "${run_security}" = true ] ||
             [ "${run_assets}" = true ] ||
             [ "${run_docker}" = true ]; then
            run_static=true
          else
            run_static=false
          fi

          {
            echo "project=${project}"
            echo "status_prefix=${status_prefix}"
            echo "request_id=${request_id}"
            echo "target_sha=${target_sha}"
            echo "checks_json=${checks_json}"
            echo "specs_json=${specs_json}"
            echo "run_db=${run_db}"
            echo "run_schema=${run_schema}"
            echo "run_tests=${run_tests}"
            echo "run_system_tests=${run_system_tests}"
            echo "run_targeted=${run_targeted}"
            echo "run_restore=${run_restore}"
            echo "run_seeds=${run_seeds}"
            echo "run_static=${run_static}"
            echo "run_lint=${run_lint}"
            echo "run_security=${run_security}"
            echo "run_assets=${run_assets}"
            echo "run_docker=${run_docker}"
          } >> "${GITHUB_OUTPUT}"

          echo "Approved ${project}/${request_id} for ${target_sha:0:12}: $(paste -sd, "${normalized_checks}")."

  db_checks:
    name: Database-backed checks
    needs: resolve
    if: needs.resolve.outputs.run_db == 'true'
    uses: ./.github/workflows/shared-db-checks.yml
    with:
      project: ${{ needs.resolve.outputs.project }}
      request_id: ${{ needs.resolve.outputs.request_id }}
      target_sha: ${{ needs.resolve.outputs.target_sha }}
      run_schema: ${{ needs.resolve.outputs.run_schema == 'true' }}
      run_tests: ${{ needs.resolve.outputs.run_tests == 'true' }}
      run_system_tests: ${{ needs.resolve.outputs.run_system_tests == 'true' }}
      run_targeted: ${{ needs.resolve.outputs.run_targeted == 'true' }}
      run_restore: ${{ needs.resolve.outputs.run_restore == 'true' }}
      run_seeds: ${{ needs.resolve.outputs.run_seeds == 'true' }}
      specs_json: ${{ needs.resolve.outputs.specs_json }}
    secrets: inherit

  static_checks:
    name: Static and release checks
    needs: resolve
    if: needs.resolve.outputs.run_static == 'true'
    uses: ./.github/workflows/shared-static-checks.yml
    with:
      project: ${{ needs.resolve.outputs.project }}
      request_id: ${{ needs.resolve.outputs.request_id }}
      target_sha: ${{ needs.resolve.outputs.target_sha }}
      run_lint: ${{ needs.resolve.outputs.run_lint == 'true' }}
      run_security: ${{ needs.resolve.outputs.run_security == 'true' }}
      run_assets: ${{ needs.resolve.outputs.run_assets == 'true' }}
      run_docker: ${{ needs.resolve.outputs.run_docker == 'true' }}
    secrets: inherit

  report:
    name: Publish requested check results
    if: always()
    needs: [resolve, db_checks, static_checks]
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Publish statuses and enforce result
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PROJECT: ${{ needs.resolve.outputs.project }}
          STATUS_PREFIX: ${{ needs.resolve.outputs.status_prefix }}
          REQUEST_ID: ${{ needs.resolve.outputs.request_id }}
          TARGET_SHA: ${{ needs.resolve.outputs.target_sha }}
          CHECKS_JSON: ${{ needs.resolve.outputs.checks_json }}
          RESOLVE_JOB: ${{ needs.resolve.result }}
          DB_JOB: ${{ needs.db_checks.result }}
          STATIC_JOB: ${{ needs.static_checks.result }}
          SCHEMA_RESULT: ${{ needs.db_checks.outputs.schema_result }}
          TESTS_RESULT: ${{ needs.db_checks.outputs.tests_result }}
          SYSTEM_TESTS_RESULT: ${{ needs.db_checks.outputs.system_tests_result }}
          TARGETED_RESULT: ${{ needs.db_checks.outputs.targeted_result }}
          RESTORE_RESULT: ${{ needs.db_checks.outputs.restore_result }}
          SEEDS_RESULT: ${{ needs.db_checks.outputs.seeds_result }}
          LINT_RESULT: ${{ needs.static_checks.outputs.lint_result }}
          SECURITY_RESULT: ${{ needs.static_checks.outputs.security_result }}
          ASSETS_RESULT: ${{ needs.static_checks.outputs.assets_result }}
          DOCKER_RESULT: ${{ needs.static_checks.outputs.docker_result }}
          PASHAMCRAFTS_STATUS_TOKEN: ${{ secrets.PASHAMCRAFTS_STATUS_TOKEN }}
          TALEEMI_IDARA_STATUS_TOKEN: ${{ secrets.TALEEMI_IDARA_STATUS_TOKEN }}
          GREENSVILLA_STATUS_TOKEN: ${{ secrets.GREENSVILLA_STATUS_TOKEN }}
        run: |
          set -euo pipefail
          overall=success
          target_repo=""
          target_token=""
          target_statuses=skipped

          publish() {
            local check="$1" result="$2" state description payload prefix
            case "${result}" in
              success) state=success ;;
              failure) state=failure; overall=failure ;;
              *) state=error; overall=failure ;;
            esac
            prefix="${STATUS_PREFIX:-validator}"
            description="${PROJECT:-unresolved} ${check} ${result} for ${TARGET_SHA:0:12}"
            payload="$(jq -n \
              --arg state "${state}" \
              --arg context "${prefix}/${check}" \
              --arg description "${description}" \
              --arg target_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{state: $state, context: $context, description: $description, target_url: $target_url}')"
            curl --fail-with-body --silent --show-error --request POST \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "Accept: application/vnd.github+json" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
              --data "${payload}" > /dev/null

            if [ -n "${target_repo}" ] && [ -n "${target_token}" ] && [ -n "${TARGET_SHA:-}" ]; then
              curl --fail-with-body --silent --show-error --request POST \
                --header "Authorization: Bearer ${target_token}" \
                --header "Accept: application/vnd.github+json" \
                --header "X-GitHub-Api-Version: 2022-11-28" \
                "${{ github.api_url }}/repos/${target_repo}/statuses/${TARGET_SHA}" \
                --data "${payload}" > /dev/null
              target_statuses=published
            fi
          }

          case "${PROJECT:-}" in
            pashamcrafts)
              target_repo="faheemKamboh/pashamcrafts"
              target_token="${PASHAMCRAFTS_STATUS_TOKEN}"
              ;;
            taleemi_idara)
              target_repo="Ustaad-Ji/taleemi_idara"
              target_token="${TALEEMI_IDARA_STATUS_TOKEN}"
              ;;
            greensvilla)
              target_repo="GreensVilla/greensvilla"
              target_token="${GREENSVILLA_STATUS_TOKEN}"
              ;;
          esac

          if [ "${RESOLVE_JOB}" != success ]; then
            overall=failure
            publish request failure
          else
            while IFS= read -r check; do
              case "${check}" in
                schema) publish schema "${SCHEMA_RESULT:-error}" ;;
                tests) publish tests "${TESTS_RESULT:-error}" ;;
                system-tests) publish system-tests "${SYSTEM_TESTS_RESULT:-error}" ;;
                targeted) publish targeted "${TARGETED_RESULT:-error}" ;;
                restore) publish restore "${RESTORE_RESULT:-error}" ;;
                seeds) publish seeds "${SEEDS_RESULT:-error}" ;;
                lint) publish lint "${LINT_RESULT:-error}" ;;
                security) publish security "${SECURITY_RESULT:-error}" ;;
                assets) publish assets "${ASSETS_RESULT:-error}" ;;
                docker) publish docker "${DOCKER_RESULT:-error}" ;;
                *) publish request failure ;;
              esac
            done < <(jq -r '.[]' <<< "${CHECKS_JSON}")
          fi

          {
            echo "## Explicit private-project verification"
            echo
            echo "Project: \`${PROJECT:-unresolved}\`"
            echo "Request: \`${REQUEST_ID:-unresolved}\`"
            echo "Target: \`${TARGET_SHA:-unresolved}\`"
            echo "Checks: \`${CHECKS_JSON:-[]}\`"
            echo "Result: **${overall}**"
            echo
            echo "Database workflow: \`${DB_JOB}\`"
            echo "Static/release workflow: \`${STATIC_JOB}\`"
            echo "Target status publication: \`${target_statuses}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

          test "${overall}" = success
