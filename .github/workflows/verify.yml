name: Verify approved PashamCrafts commit

on:
  workflow_dispatch:
    inputs:
      target_sha:
        description: Exact PashamCrafts commit SHA
        required: true
        type: string
      profile:
        description: Allowlisted verification profile
        required: true
        type: choice
        options:
          - full
          - targeted
          - schema
          - lint
          - security
          - restore
      specs:
        description: Comma- or newline-separated spec paths for the targeted profile
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - "ci/request.json"
      - ".github/workflows/verify.yml"

permissions:
  contents: read

jobs:
  verify:
    name: PashamCrafts explicit verification
    runs-on: ubuntu-latest
    timeout-minutes: 40
    outputs:
      target_sha: ${{ steps.request.outputs.target_sha }}
      profile: ${{ steps.request.outputs.profile }}
      result: ${{ steps.result.outputs.result }}

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:password@localhost/pashamcrafts_test

    steps:
      - name: Checkout verification configuration
        uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Resolve and validate explicit request
        id: request
        shell: bash
        env:
          DISPATCH_TARGET_SHA: ${{ inputs.target_sha }}
          DISPATCH_PROFILE: ${{ inputs.profile }}
          DISPATCH_SPECS: ${{ inputs.specs }}
        run: |
          set -euo pipefail
          specs_file="${RUNNER_TEMP}/requested-specs.txt"
          : > "${specs_file}"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            target_sha="${DISPATCH_TARGET_SHA}"
            profile="${DISPATCH_PROFILE}"
            printf '%s\n' "${DISPATCH_SPECS}" | tr ',' '\n' > "${specs_file}"
          else
            target_sha="$(jq -er '.target_sha' ci/request.json)"
            profile="$(jq -er '.profile' ci/request.json)"
            jq -r '.specs[]?' ci/request.json > "${specs_file}"
          fi

          [[ "${target_sha}" =~ ^[0-9a-f]{40}$ ]] || { echo "Invalid target SHA."; exit 1; }
          case "${profile}" in
            full|targeted|schema|lint|security|restore) ;;
            *) echo "Unsupported verification profile."; exit 1 ;;
          esac

          normalized="${RUNNER_TEMP}/normalized-specs.txt"
          : > "${normalized}"
          count=0
          while IFS= read -r spec; do
            spec="$(printf '%s' "${spec}" | xargs)"
            [ -z "${spec}" ] && continue
            [[ "${spec}" =~ ^spec/[A-Za-z0-9_./-]+(:[0-9]+)?$ ]] || {
              echo "Invalid targeted spec reference."
              exit 1
            }
            printf '%s\n' "${spec}" >> "${normalized}"
            count=$((count + 1))
          done < "${specs_file}"

          if [ "${profile}" = "targeted" ]; then
            [ "${count}" -gt 0 ] || { echo "Targeted profile requires at least one spec."; exit 1; }
            [ "${count}" -le 25 ] || { echo "Targeted profile accepts at most 25 specs."; exit 1; }
          elif [ "${count}" -gt 0 ]; then
            echo "Spec references are accepted only by the targeted profile."
            exit 1
          fi

          echo "target_sha=${target_sha}" >> "${GITHUB_OUTPUT}"
          echo "profile=${profile}" >> "${GITHUB_OUTPUT}"
          {
            echo "specs<<__PASHAM_SPECS__"
            cat "${normalized}"
            echo "__PASHAM_SPECS__"
          } >> "${GITHUB_OUTPUT}"
          echo "Approved ${profile} request for ${target_sha:0:12}."

      - name: Checkout exact PashamCrafts commit
        uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          repository: faheemKamboh/pashamcrafts
          ref: ${{ steps.request.outputs.target_sha }}
          token: ${{ secrets.PASHAMCRAFTS_READ_TOKEN }}
          persist-credentials: false
          fetch-depth: 1
          path: app

      - name: Confirm exact checkout
        shell: bash
        run: test "$(git -C app rev-parse HEAD)" = "${{ steps.request.outputs.target_sha }}"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libvips postgresql-client

      - name: Set up Ruby and gems
        uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9
        with:
          bundler-cache: true
          working-directory: app

      - name: Prepare test database
        id: database
        if: steps.request.outputs.profile == 'full' || steps.request.outputs.profile == 'targeted' || steps.request.outputs.profile == 'schema' || steps.request.outputs.profile == 'restore'
        continue-on-error: true
        working-directory: app
        shell: bash
        run: |
          set +e
          bundle exec rails db:create db:migrate > "${RUNNER_TEMP}/database.log" 2>&1
          status=$?
          result=$([ "${status}" -eq 0 ] && echo success || echo failure)
          echo "result=${result}" >> "${GITHUB_OUTPUT}"
          echo "Database preparation: ${result^^}"
          exit "${status}"

      - name: Verify committed schema
        id: schema
        if: (steps.request.outputs.profile == 'full' || steps.request.outputs.profile == 'schema') && steps.database.outputs.result == 'success'
        continue-on-error: true
        working-directory: app
        shell: bash
        run: |
          set +e
          git diff -- db/schema.rb > "${RUNNER_TEMP}/schema.diff"
          git diff --quiet -- db/schema.rb
          status=$?
          if [ "${status}" -ne 0 ]; then cp db/schema.rb "${RUNNER_TEMP}/generated-schema.rb"; fi
          result=$([ "${status}" -eq 0 ] && echo success || echo failure)
          echo "result=${result}" >> "${GITHUB_OUTPUT}"
          echo "Committed schema: ${result^^}"
          exit "${status}"

      - name: Run complete RSpec suite and enforce coverage
        id: full_tests
        if: steps.request.outputs.profile == 'full' && steps.database.outputs.result == 'success'
        continue-on-error: true
        working-directory: app
        shell: bash
        run: |
          set +e
          bundle exec rspec --format progress > "${RUNNER_TEMP}/rspec.log" 2>&1
          test_status=$?
          summary="$(grep -E '^[0-9]+ examples?, [0-9]+ failures?' "${RUNNER_TEMP}/rspec.log" | tail -n 1 || true)"
          coverage="$(grep -oE 'Line Coverage: [0-9.]+' "${RUNNER_TEMP}/rspec.log" | tail -n 1 | awk '{print $3}' || true)"
          coverage_status=1
          if [ -n "${coverage}" ]; then
            awk -v coverage="${coverage}" 'BEGIN { exit !(coverage >= 98) }'
            coverage_status=$?
          fi
          if [ "${test_status}" -eq 0 ] && [ "${coverage_status}" -eq 0 ]; then result=success; else result=failure; fi
          echo "result=${result}" >> "${GITHUB_OUTPUT}"
          [ -n "${summary}" ] && echo "RSpec: ${summary}" || echo "RSpec summary unavailable."
          [ -n "${coverage}" ] && echo "Line coverage: ${coverage}%" || echo "Line coverage unavailable."
          exit $([ "${result}" = success ] && echo 0 || echo 1)

      - name: Run targeted RSpec examples
        id: targeted_tests
        if: steps.request.outputs.profile == 'targeted' && steps.database.outputs.result == 'success'
        continue-on-error: true
        working-directory: app
        shell: bash
        env:
          REQUESTED_SPECS: ${{ steps.request.outputs.specs }}
        run: |
          set +e
          mapfile -t specs < <(printf '%s\n' "${REQUESTED_SPECS}" | sed '/^$/d')
          for spec in "${specs[@]}"; do
            path="${spec%%:*}"
            [ -f "${path}" ] || { echo "Requested spec does not exist."; exit 2; }
          done
          bundle exec rspec "${specs[@]}" --format progress > "${RUNNER_TEMP}/targeted-rspec.log" 2>&1
          command_status=$?
          summary="$(grep -E '^[0-9]+ examples?, [0-9]+ failures?' "${RUNNER_TEMP}/targeted-rspec.log" | tail -n 1 || true)"
          if printf '%s' "${summary}" | grep -Eq '^[0-9]+ examples?, 0 failures?'; then
            result=success
          else
            result=failure
          fi
          echo "result=${result}" >> "${GITHUB_OUTPUT}"
          [ -n "${summary}" ] && echo "Targeted RSpec: ${summary}" || echo "Targeted RSpec summary unavailable; command status ${command_status}."
          exit $([ "${result}" = success ] && echo 0 || echo 1)

      - name: Run RuboCop
        id: lint
        if: steps.request.outputs.profile == 'full' || steps.request.outputs.profile == 'lint'
        continue-on-error: true
        working-directory: app
        shell: bash
        run: |
          set +e
          bin/rubocop --format progress > "${RUNNER_TEMP}/rubocop.log" 2>&1
          status=$?
          result=$([ "${status}" -eq 0 ] && echo success || echo failure)
          echo "result=${result}" >> "${GITHUB_OUTPUT}"
          grep -E '[0-9]+ files? inspected' "${RUNNER_TEMP}/rubocop.log" | tail -n 1 || true
          exit "${status}"

      - name: Run Brakeman
        id: security
        if: steps.request.outputs.profile == 'full' || steps.request.outputs.profile == 'security'
        continue-on-error: true
        working-directory: app
        shell: bash
        run: |
          set +e
          bundle exec brakeman --quiet --no-pager --exit-on-warn --exit-on-error -f json -o "${RUNNER_TEMP}/brakeman.json" > "${RUNNER_TEMP}/brakeman.log" 2>&1
          status=$?
          result=$([ "${status}" -eq 0 ] && echo success || echo failure)
          echo "result=${result}" >> "${GITHUB_OUTPUT}"
          echo "Brakeman: ${result^^}"
          exit "${status}"

      - name: Run backup and restore drill
        id: restore
        if: (steps.request.outputs.profile == 'full' || steps.request.outputs.profile == 'restore') && steps.database.outputs.result == 'success'
        continue-on-error: true
        working-directory: app
        shell: bash
        env:
          DATABASE_URL: postgres://postgres:password@localhost/pashamcrafts_backup_source
          RESTORE_DATABASE_URL: postgres://postgres:password@localhost/pashamcrafts_restore_test
          BACKUP_DIR: ${{ runner.temp }}/backup-drill
          ALLOW_DESTRUCTIVE_RESTORE: "true"
          PGPASSWORD: password
        run: |
          set +e
          {
            bundle exec rails db:create db:migrate &&
            bundle exec rails runner 'Audit::Recorder.record!(action: "backup.restore_drill")' &&
            bin/backup_database &&
            createdb --host=localhost --username=postgres pashamcrafts_restore_test &&
            export BACKUP_FILE="$(find "${BACKUP_DIR}" -name '*.dump' -type f | head -n 1)" &&
            test -n "${BACKUP_FILE}" &&
            bin/verify_database_restore &&
            test "$(psql "${RESTORE_DATABASE_URL}" -Atqc "SELECT COUNT(*) FROM audit_events WHERE action = 'backup.restore_drill'")" = "1"
          } > "${RUNNER_TEMP}/restore.log" 2>&1
          status=$?
          result=$([ "${status}" -eq 0 ] && echo success || echo failure)
          echo "result=${result}" >> "${GITHUB_OUTPUT}"
          echo "Backup and restore: ${result^^}"
          exit "${status}"

      - name: Calculate requested profile result
        id: result
        if: always()
        shell: bash
        env:
          PROFILE: ${{ steps.request.outputs.profile }}
          DATABASE_RESULT: ${{ steps.database.outputs.result }}
          SCHEMA_RESULT: ${{ steps.schema.outputs.result }}
          FULL_TEST_RESULT: ${{ steps.full_tests.outputs.result }}
          TARGETED_TEST_RESULT: ${{ steps.targeted_tests.outputs.result }}
          LINT_RESULT: ${{ steps.lint.outputs.result }}
          SECURITY_RESULT: ${{ steps.security.outputs.result }}
          RESTORE_RESULT: ${{ steps.restore.outputs.result }}
        run: |
          set -euo pipefail
          result=success
          require_success() { [ "$1" = success ] || result=failure; }
          case "${PROFILE}" in
            full)
              require_success "${DATABASE_RESULT:-error}"
              require_success "${SCHEMA_RESULT:-error}"
              require_success "${FULL_TEST_RESULT:-error}"
              require_success "${LINT_RESULT:-error}"
              require_success "${SECURITY_RESULT:-error}"
              require_success "${RESTORE_RESULT:-error}"
              ;;
            targeted)
              require_success "${DATABASE_RESULT:-error}"
              require_success "${TARGETED_TEST_RESULT:-error}"
              ;;
            schema)
              require_success "${DATABASE_RESULT:-error}"
              require_success "${SCHEMA_RESULT:-error}"
              ;;
            lint) require_success "${LINT_RESULT:-error}" ;;
            security) require_success "${SECURITY_RESULT:-error}" ;;
            restore)
              require_success "${DATABASE_RESULT:-error}"
              require_success "${RESTORE_RESULT:-error}"
              ;;
            *) result=failure ;;
          esac
          echo "result=${result}" >> "${GITHUB_OUTPUT}"
          {
            echo "## Explicit PashamCrafts verification"
            echo
            echo "Target: `${{ steps.request.outputs.target_sha }}`"
            echo "Profile: `${PROFILE}`"
            echo "Result: **${result}**"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Encrypt failure diagnostics
        if: always() && steps.result.outputs.result != 'success'
        shell: bash
        run: |
          set -euo pipefail
          diagnostics="${RUNNER_TEMP}/diagnostics"
          encrypted="${RUNNER_TEMP}/encrypted-diagnostics"
          mkdir -p "${diagnostics}" "${encrypted}"
          for file in database.log schema.diff generated-schema.rb rspec.log targeted-rspec.log rubocop.log brakeman.log brakeman.json restore.log; do
            [ -f "${RUNNER_TEMP}/${file}" ] && cp "${RUNNER_TEMP}/${file}" "${diagnostics}/${file}"
          done
          tar -czf "${RUNNER_TEMP}/diagnostics.tar.gz" -C "${diagnostics}" .
          cat > "${RUNNER_TEMP}/diagnostic-public.pem" <<'PUBLIC_KEY'
          -----BEGIN PUBLIC KEY-----
          MIIBojANBgkqhkiG9w0BAQEFAAOCAY8AMIIBigKCAYEAq0+e4QuKjIqicH4FOmbg
          5eLb+RBRGjLsf1hVj3DA2QscIiL3/35H07ZFeXXZ2akEfLYtX/lnLiIHihMxW/8B
          xgMgXHETYzcGZ3JaRLLL8prAi1nPaYiajxFkiE2UevDKzE+5pmJ5CpIt+tB5L6Kq
          3xay91hYitCdc7OLFQMt1yIzZZnbOAL4Sa3Zo1lVg8DMeQmyjwuN7AZSVkQOvbLa
          QysHW4+IBP8E9N4B+3yspqbmh8bYum26wfTaD35LBQSUasmpQ7RMIu6bBeUmk898
          2wNCOe0PTK3OyW9T9kGkzkYrE0PNW5rOx2U3IjgMud0g1+I6HxNA8llOn1xI0m6t
          oZZOh7PsN1Gq/bfsdF91gZNfrlsglSqbfx8RJJWn8bcqF7jcxnos+h8nuQMrjIa0
          WX7ogy9unowrcXS3ILle5bRQssggzsIZLOdnUV7QFMi43cr+ZFg1wo5rQP9vR7zg
          tV+Gz9SXCRLZOevXhH4E8jqgTKg9RL1WcA+WG9ckmYU7AgMBAAE=
          -----END PUBLIC KEY-----
          PUBLIC_KEY
          openssl rand -hex 32 > "${RUNNER_TEMP}/diagnostic-passphrase"
          openssl enc -aes-256-cbc -salt -pbkdf2 \
            -in "${RUNNER_TEMP}/diagnostics.tar.gz" \
            -out "${encrypted}/payload.enc" \
            -pass file:"${RUNNER_TEMP}/diagnostic-passphrase"
          openssl pkeyutl -encrypt -pubin \
            -inkey "${RUNNER_TEMP}/diagnostic-public.pem" \
            -in "${RUNNER_TEMP}/diagnostic-passphrase" \
            -out "${encrypted}/passphrase.enc" \
            -pkeyopt rsa_padding_mode:oaep \
            -pkeyopt rsa_oaep_md:sha256
          rm -rf "${diagnostics}" "${RUNNER_TEMP}/diagnostics.tar.gz" \
            "${RUNNER_TEMP}/diagnostic-passphrase" "${RUNNER_TEMP}/diagnostic-public.pem"

      - name: Upload encrypted failure diagnostics
        if: always() && steps.result.outputs.result != 'success'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: encrypted-${{ steps.request.outputs.profile }}-diagnostics
          path: ${{ runner.temp }}/encrypted-diagnostics
          retention-days: 1
          if-no-files-found: error

      - name: Enforce requested profile result
        if: always()
        run: test "${{ steps.result.outputs.result }}" = success

  report:
    name: Publish explicit verification status
    if: always()
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Publish final status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PROFILE: ${{ needs.verify.outputs.profile }}
          TARGET_SHA: ${{ needs.verify.outputs.target_sha }}
          RESULT: ${{ needs.verify.outputs.result }}
        run: |
          set -euo pipefail
          profile="${PROFILE:-unknown}"
          result="${RESULT:-failure}"
          case "${result}" in success) state=success;; failure) state=failure;; *) state=error;; esac
          description="${profile} verification ${result} for ${TARGET_SHA:0:12}"
          payload="$(jq -n --arg state "${state}" --arg context "pashamcrafts/${profile}" --arg description "${description}" --arg target_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{state: $state, context: $context, description: $description, target_url: $target_url}')"
          curl --fail-with-body --silent --show-error --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2026-03-10" \
            "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            --data "${payload}" > /dev/null
