name: Diagnose coverage gaps

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/coverage-diagnose.yml"
      - "ci/target.sha"

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      detail: ${{ steps.gaps.outputs.detail }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:password@localhost/pashamcrafts_test
    steps:
      - uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          persist-credentials: false
          fetch-depth: 1
      - id: target
        shell: bash
        run: |
          set -euo pipefail
          target_sha="$(tr -d '[:space:]' < ci/target.sha)"
          [[ "${target_sha}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          echo "sha=${target_sha}" >> "${GITHUB_OUTPUT}"
      - uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          repository: faheemKamboh/pashamcrafts
          ref: ${{ steps.target.outputs.sha }}
          token: ${{ secrets.PASHAMCRAFTS_READ_TOKEN }}
          persist-credentials: false
          fetch-depth: 1
          path: app
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libvips postgresql-client
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9
        with:
          bundler-cache: true
          working-directory: app
      - working-directory: app
        run: bundle exec rails db:create db:migrate
      - working-directory: app
        run: bundle exec rspec --format progress > "${RUNNER_TEMP}/rspec.log" 2>&1
      - name: Extract uncovered line locations
        id: gaps
        working-directory: app
        shell: bash
        run: |
          set -euo pipefail
          detail="$(bundle exec ruby -rjson -e '
            data = JSON.parse(File.read("coverage/.resultset.json"))
            result = data.values.max_by { |entry| entry.fetch("timestamp", 0) }
            coverage = result.fetch("coverage")
            root = Dir.pwd + "/"
            gaps = coverage.filter_map do |path, metrics|
              lines = metrics.is_a?(Hash) ? metrics["lines"] : metrics
              next unless lines
              missed = lines.each_index.select { |index| lines[index] == 0 }.map { |index| index + 1 }
              next if missed.empty?
              relative = path.delete_prefix(root)
              [missed.length, "#{relative}:#{missed.first(30).join(",")}"]
            end
            puts gaps.sort_by { |count, _| -count }.first(12).map(&:last).join(" | ")
          ' | tr '\n\r' '  ' | cut -c1-1200)"
          echo "detail=${detail}" >> "${GITHUB_OUTPUT}"
          echo "Coverage gaps extracted."

  report:
    if: always()
    needs: coverage
    runs-on: ubuntu-latest
    steps:
      - name: Expose sanitized coverage locations
        shell: bash
        env:
          COVERAGE_DETAIL: ${{ needs.coverage.outputs.detail }}
        run: |
          printf 'COVERAGE_DETAIL=%s\n' "${COVERAGE_DETAIL:-unavailable}"
