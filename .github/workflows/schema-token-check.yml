name: Check PashamCrafts schema token

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/schema-token-check.yml"

permissions:
  contents: read
  statuses: write

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Check repository and branch access
        id: check
        shell: bash
        env:
          PRIVATE_TOKEN: ${{ secrets.PASHAMCRAFTS_SCHEMA_WRITE_TOKEN }}
        run: |
          set -euo pipefail
          response_file="$(mktemp)"
          status="$(curl --silent --show-error --output "${response_file}" --write-out '%{http_code}' \
            --header "Authorization: Bearer ${PRIVATE_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/faheemKamboh/pashamcrafts/branches/feature%2Fissue-72-search-content-seo")"
          message="$(jq -r '.message // "ok"' "${response_file}" 2>/dev/null || printf 'unreadable-response')"
          echo "status=${status}" >> "${GITHUB_OUTPUT}"
          echo "message=${message}" >> "${GITHUB_OUTPUT}"
          test "${status}" = "200"

      - name: Publish diagnostic
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HTTP_STATUS: ${{ steps.check.outputs.status }}
          API_MESSAGE: ${{ steps.check.outputs.message }}
          RESULT: ${{ job.status }}
        run: |
          set -euo pipefail
          if [ "${RESULT}" = success ]; then state=success; else state=failure; fi
          description="HTTP ${HTTP_STATUS:-none}: ${API_MESSAGE:-no-message}"
          description="${description:0:130}"
          payload="$(jq -n --arg state "${state}" --arg context "pashamcrafts/schema-token-check" --arg description "${description}" --arg target_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{state: $state, context: $context, description: $description, target_url: $target_url}')"
          curl --fail-with-body --silent --show-error --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            --data "${payload}" > /dev/null
