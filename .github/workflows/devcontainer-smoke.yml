name: Verify PashamCrafts dev container

on:
  push:
    branches:
      - main
    paths:
      - "ci/devcontainer-target.sha"
      - ".github/workflows/devcontainer-smoke.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: pashamcrafts-devcontainer-verify
  cancel-in-progress: true

jobs:
  smoke:
    name: Build and smoke-test dev container
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Publish pending commit status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          payload="$(jq -n \
            --arg state "pending" \
            --arg context "pashamcrafts/devcontainer" \
            --arg description "Dev container verification running" \
            --arg target_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{state: $state, context: $context, description: $description, target_url: $target_url}')"
          curl --fail-with-body --silent --show-error --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            --data "${payload}" > /dev/null

      - name: Checkout verification configuration
        uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Validate approved target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          target_sha="$(tr -d '[:space:]' < ci/devcontainer-target.sha)"
          if [[ ! "${target_sha}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Invalid target SHA."
            exit 1
          fi
          echo "target_sha=${target_sha}" >> "${GITHUB_OUTPUT}"
          echo "Approved dev-container target: ${target_sha:0:12}"

      - name: Checkout exact PashamCrafts commit
        uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          repository: faheemKamboh/pashamcrafts
          ref: ${{ steps.target.outputs.target_sha }}
          token: ${{ secrets.PASHAMCRAFTS_READ_TOKEN }}
          persist-credentials: false
          fetch-depth: 1
          path: app

      - name: Confirm exact checkout
        shell: bash
        run: |
          set -euo pipefail
          expected="${{ steps.target.outputs.target_sha }}"
          actual="$(git -C app rev-parse HEAD)"
          test "${actual}" = "${expected}"
          echo "Checked out exact commit ${actual:0:12}."

      - name: Install Dev Container CLI
        shell: bash
        run: npm install --global @devcontainers/cli@0.87.0

      - name: Build and start the dev container
        working-directory: app
        shell: bash
        run: |
          set -euo pipefail
          devcontainer up \
            --workspace-folder . \
            --remove-existing-container \
            --log-level info

      - name: Verify runtime identity and toolchain
        working-directory: app
        shell: bash
        run: |
          set -euo pipefail
          devcontainer exec --workspace-folder . bash -lc '
            set -euo pipefail
            ruby --version | grep -F "ruby 4.0.1"
            bundle --version | grep -Fx "Bundler version 4.0.6"
            id -un | grep -Fx "vscode"
            test -z "${RAILS_ENV:-}"
            test -w /usr/local/bundle
            test -w /workspaces/pashamcrafts
            gh --version
            chromium --version
          '

      - name: Verify PostgreSQL and Rails development boot
        working-directory: app
        shell: bash
        run: |
          set -euo pipefail
          devcontainer exec --workspace-folder . bash -lc '
            set -euo pipefail
            pg_isready -h db -U postgres -d pashamcrafts_development
            bin/rails runner "abort(\"wrong Rails environment\") unless Rails.env.development?; abort(\"database unavailable\") unless ActiveRecord::Base.connection.active?; puts Rails.env"
          '

      - name: Verify TailwindCSS build
        working-directory: app
        shell: bash
        run: |
          set -euo pipefail
          devcontainer exec --workspace-folder . bash -lc '
            set -euo pipefail
            bin/rails tailwindcss:build
          '

      - name: Verify test environment and RSpec
        working-directory: app
        shell: bash
        run: |
          set -euo pipefail
          devcontainer exec --workspace-folder . bash -lc '
            set -euo pipefail
            test -z "${RAILS_ENV:-}"
            RAILS_ENV=test bin/rails db:prepare > /tmp/test-database.log 2>&1
            set +e
            bundle exec rspec --format progress > /tmp/rspec.log 2>&1
            status=$?
            set -e
            summary="$(grep -E "^[0-9]+ examples?, [0-9]+ failures?" /tmp/rspec.log | tail -n 1 || true)"
            test -n "${summary}" && echo "RSpec: ${summary}"
            test "${status}" -eq 0
          '

      - name: Verify RuboCop
        working-directory: app
        shell: bash
        run: |
          set -euo pipefail
          devcontainer exec --workspace-folder . bash -lc '
            set -euo pipefail
            set +e
            bin/rubocop --format progress > /tmp/rubocop.log 2>&1
            status=$?
            set -e
            summary="$(grep -E "[0-9]+ files? inspected" /tmp/rubocop.log | tail -n 1 || true)"
            test -n "${summary}" && echo "RuboCop: ${summary}"
            test "${status}" -eq 0
          '

      - name: Publish summary
        if: always()
        shell: bash
        run: |
          {
            echo "## PashamCrafts dev-container verification"
            echo
            echo "Target: `${{ steps.target.outputs.target_sha }}`"
            echo
            echo "The workflow builds the exact `.devcontainer` configuration, executes lifecycle hooks, checks the non-root runtime, PostgreSQL connectivity, Rails development and test environments, TailwindCSS, RSpec, and RuboCop."
          } >> "${GITHUB_STEP_SUMMARY}"

  report:
    if: always()
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Publish final commit status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ needs.smoke.result }}
        run: |
          set -euo pipefail
          case "${RESULT}" in
            success) state=success ;;
            failure) state=failure ;;
            *) state=error ;;
          esac
          payload="$(jq -n \
            --arg state "${state}" \
            --arg context "pashamcrafts/devcontainer" \
            --arg description "Dev container verification ${RESULT}" \
            --arg target_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{state: $state, context: $context, description: $description, target_url: $target_url}')"
          curl --fail-with-body --silent --show-error --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            --data "${payload}" > /dev/null
