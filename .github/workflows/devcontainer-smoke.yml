name: Verify PashamCrafts dev container

on:
  push:
    branches:
      - main
    paths:
      - "ci/devcontainer-target.sha"
      - ".github/workflows/devcontainer-smoke.yml"

permissions:
  contents: read
  statuses: write

concurrency:
  group: pashamcrafts-devcontainer-verify
  cancel-in-progress: true

jobs:
  smoke:
    name: Build and smoke-test dev container
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Publish pending commit status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          payload="$(jq -n --arg state pending --arg context pashamcrafts/devcontainer --arg description "Dev container verification running" --arg target_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{state: $state, context: $context, description: $description, target_url: $target_url}')"
          curl --fail-with-body --silent --show-error --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            --data "${payload}" > /dev/null

      - name: Checkout verification configuration
        uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Validate approved target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          target_sha="$(tr -d '[:space:]' < ci/devcontainer-target.sha)"
          [[ "${target_sha}" =~ ^[0-9a-f]{40}$ ]]
          echo "target_sha=${target_sha}" >> "${GITHUB_OUTPUT}"
          echo "Approved dev-container target: ${target_sha:0:12}"

      - name: Checkout exact PashamCrafts commit
        uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          repository: faheemKamboh/pashamcrafts
          ref: ${{ steps.target.outputs.target_sha }}
          token: ${{ secrets.PASHAMCRAFTS_READ_TOKEN }}
          persist-credentials: false
          fetch-depth: 1
          path: app

      - name: Confirm exact checkout
        run: test "$(git -C app rev-parse HEAD)" = "${{ steps.target.outputs.target_sha }}"

      - name: Install Dev Container CLI
        run: npm install --global @devcontainers/cli@0.87.0

      - name: Build and start the dev container
        id: build
        working-directory: app
        run: devcontainer up --workspace-folder . --remove-existing-container --log-level info

      - name: Verify container exec
        id: container_exec
        if: steps.build.outcome == 'success'
        continue-on-error: true
        working-directory: app
        run: devcontainer exec --workspace-folder . true

      - name: Verify Ruby
        id: ruby
        if: steps.build.outcome == 'success'
        continue-on-error: true
        working-directory: app
        shell: bash
        run: devcontainer exec --workspace-folder . ruby --version | grep -F "ruby 4.0.1"

      - name: Verify Bundler
        id: bundler
        if: steps.build.outcome == 'success'
        continue-on-error: true
        working-directory: app
        shell: bash
        run: devcontainer exec --workspace-folder . bundle --version | grep -F "Bundler version 4.0.6"

      - name: Verify non-root user
        id: user
        if: steps.build.outcome == 'success'
        continue-on-error: true
        working-directory: app
        shell: bash
        run: devcontainer exec --workspace-folder . id -un | grep -Fx "vscode"

      - name: Verify environment and writable paths
        id: environment
        if: steps.build.outcome == 'success'
        continue-on-error: true
        working-directory: app
        shell: bash
        run: |
          devcontainer exec --workspace-folder . bash -lc '
            set -euo pipefail
            test -z "${RAILS_ENV:-}"
            test -w /usr/local/bundle
            test -w /workspaces/pashamcrafts
          '

      - name: Verify GitHub CLI feature
        id: github_cli
        if: steps.build.outcome == 'success'
        continue-on-error: true
        working-directory: app
        run: devcontainer exec --workspace-folder . gh --version

      - name: Verify Chromium
        id: chromium
        if: steps.build.outcome == 'success'
        continue-on-error: true
        working-directory: app
        run: devcontainer exec --workspace-folder . chromium --version

      - name: Verify PostgreSQL and Rails development boot
        id: rails
        if: steps.build.outcome == 'success'
        continue-on-error: true
        working-directory: app
        shell: bash
        run: |
          devcontainer exec --workspace-folder . bash -lc '
            set -euo pipefail
            pg_isready -h db -U postgres -d pashamcrafts_development
            bin/rails runner "abort(\"wrong Rails environment\") unless Rails.env.development?; abort(\"database unavailable\") unless ActiveRecord::Base.connection.active?; puts Rails.env"
          '

      - name: Verify TailwindCSS build
        id: tailwind
        if: steps.build.outcome == 'success'
        continue-on-error: true
        working-directory: app
        run: devcontainer exec --workspace-folder . bin/rails tailwindcss:build

      - name: Verify test environment and RSpec
        id: rspec
        if: steps.build.outcome == 'success'
        continue-on-error: true
        working-directory: app
        shell: bash
        run: |
          devcontainer exec --workspace-folder . bash -lc '
            set -euo pipefail
            test -z "${RAILS_ENV:-}"
            RAILS_ENV=test bin/rails db:prepare > /tmp/test-database.log 2>&1
            set +e
            bundle exec rspec --format progress > /tmp/rspec.log 2>&1
            status=$?
            set -e
            summary="$(grep -E "^[0-9]+ examples?, [0-9]+ failures?" /tmp/rspec.log | tail -n 1 || true)"
            test -n "${summary}" && echo "RSpec: ${summary}"
            test "${status}" -eq 0
          '

      - name: Verify RuboCop
        id: rubocop
        if: steps.build.outcome == 'success'
        continue-on-error: true
        working-directory: app
        shell: bash
        run: |
          devcontainer exec --workspace-folder . bash -lc '
            set -euo pipefail
            set +e
            bin/rubocop --format progress > /tmp/rubocop.log 2>&1
            status=$?
            set -e
            summary="$(grep -E "[0-9]+ files? inspected" /tmp/rubocop.log | tail -n 1 || true)"
            test -n "${summary}" && echo "RuboCop: ${summary}"
            test "${status}" -eq 0
          '

      - name: Enforce verification results
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test "${{ steps.build.outcome }}" = success
          test "${{ steps.container_exec.outcome }}" = success
          test "${{ steps.ruby.outcome }}" = success
          test "${{ steps.bundler.outcome }}" = success
          test "${{ steps.user.outcome }}" = success
          test "${{ steps.environment.outcome }}" = success
          test "${{ steps.github_cli.outcome }}" = success
          test "${{ steps.chromium.outcome }}" = success
          test "${{ steps.rails.outcome }}" = success
          test "${{ steps.tailwind.outcome }}" = success
          test "${{ steps.rspec.outcome }}" = success
          test "${{ steps.rubocop.outcome }}" = success

      - name: Publish summary
        if: always()
        run: |
          {
            echo "## PashamCrafts dev-container verification"
            echo
            echo "Target: `${{ steps.target.outputs.target_sha }}`"
            echo
            echo "| Check | Result |"
            echo "|---|---|"
            echo "| Build and lifecycle | ${{ steps.build.outcome }} |"
            echo "| Container exec | ${{ steps.container_exec.outcome }} |"
            echo "| Ruby | ${{ steps.ruby.outcome }} |"
            echo "| Bundler | ${{ steps.bundler.outcome }} |"
            echo "| Non-root user | ${{ steps.user.outcome }} |"
            echo "| Environment and paths | ${{ steps.environment.outcome }} |"
            echo "| GitHub CLI | ${{ steps.github_cli.outcome }} |"
            echo "| Chromium | ${{ steps.chromium.outcome }} |"
            echo "| PostgreSQL and Rails | ${{ steps.rails.outcome }} |"
            echo "| TailwindCSS | ${{ steps.tailwind.outcome }} |"
            echo "| RSpec | ${{ steps.rspec.outcome }} |"
            echo "| RuboCop | ${{ steps.rubocop.outcome }} |"
          } >> "${GITHUB_STEP_SUMMARY}"

  report:
    if: always()
    needs: smoke
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Publish final commit status
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ needs.smoke.result }}
        run: |
          set -euo pipefail
          case "${RESULT}" in
            success) state=success ;;
            failure) state=failure ;;
            *) state=error ;;
          esac
          payload="$(jq -n --arg state "${state}" --arg context pashamcrafts/devcontainer --arg description "Dev container verification ${RESULT}" --arg target_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{state: $state, context: $context, description: $description, target_url: $target_url}')"
          curl --fail-with-body --silent --show-error --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            --data "${payload}" > /dev/null
