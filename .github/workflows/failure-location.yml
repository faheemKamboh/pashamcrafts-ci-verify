name: Locate approved-commit test failure

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/failure-location.yml"
      - "ci/target.sha"

permissions:
  contents: read

jobs:
  locate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      result: ${{ steps.tests.outputs.result }}
      location: ${{ steps.tests.outputs.location }}
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:password@localhost/pashamcrafts_failure_location
    steps:
      - uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          persist-credentials: false
          fetch-depth: 1
      - id: target
        shell: bash
        run: |
          set -euo pipefail
          target_sha="$(tr -d '[:space:]' < ci/target.sha)"
          [[ "${target_sha}" =~ ^[0-9a-f]{40}$ ]] || exit 1
          echo "sha=${target_sha}" >> "${GITHUB_OUTPUT}"
      - uses: actions/checkout@1044a6dea927916f2c38ba5aeffbc0a847b1221a
        with:
          repository: faheemKamboh/pashamcrafts
          ref: ${{ steps.target.outputs.sha }}
          token: ${{ secrets.PASHAMCRAFTS_READ_TOKEN }}
          persist-credentials: false
          fetch-depth: 1
          path: app
      - run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libvips postgresql-client
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9
        with:
          bundler-cache: true
          working-directory: app
      - working-directory: app
        run: bundle exec rails db:create db:migrate
      - name: Capture first failing example location
        id: tests
        working-directory: app
        shell: bash
        run: |
          set +e
          bundle exec rspec --format progress > "${RUNNER_TEMP}/rspec.log" 2>&1
          status=$?
          if [ "${status}" -eq 0 ]; then
            result=success
            location=all-tests-passed
          else
            result=failure
            raw="$(grep -E '^rspec \./spec/' "${RUNNER_TEMP}/rspec.log" | head -n 1 || true)"
            [ -n "${raw}" ] || raw="failure-location-unavailable"
            location="$(printf '%s' "${raw}" | sed -E 's/^rspec \.\///; s/ # .*//; s/[^A-Za-z0-9._:-]+/-/g' | cut -c1-75)"
          fi
          echo "result=${result}" >> "${GITHUB_OUTPUT}"
          echo "location=${location}" >> "${GITHUB_OUTPUT}"
          echo "Sanitized result: ${result} at ${location}"

  report:
    if: always()
    needs: locate
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Publish sanitized location
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ needs.locate.outputs.result }}
          LOCATION: ${{ needs.locate.outputs.location }}
        run: |
          set -euo pipefail
          case "${RESULT}" in success) state=success;; failure) state=failure;; *) state=error;; esac
          context="pashamcrafts/failure-${LOCATION:-unavailable}"
          context="$(printf '%s' "${context}" | cut -c1-100)"
          payload="$(jq -n --arg state "${state}" --arg context "${context}" --arg description "Sanitized first failing example location" --arg target_url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" '{state: $state, context: $context, description: $description, target_url: $target_url}')"
          curl --fail-with-body --silent --show-error --request POST \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "${{ github.api_url }}/repos/${{ github.repository }}/statuses/${{ github.sha }}" \
            --data "${payload}" > /dev/null
